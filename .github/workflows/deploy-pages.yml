name: Deploy GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Configure Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Resolve build settings
        shell: bash
        run: |
          if [ -n "${{ vars.PAGES_SITE_URL }}" ]; then
            echo "SITE_URL=${{ vars.PAGES_SITE_URL }}" >> "$GITHUB_ENV"
          elif [ -n "${{ vars.PAGES_CNAME }}" ]; then
            echo "SITE_URL=https://${{ vars.PAGES_CNAME }}" >> "$GITHUB_ENV"
          else
            echo "SITE_URL=https://${{ github.repository_owner }}.github.io" >> "$GITHUB_ENV"
          fi

          if [ -n "${{ vars.PAGES_BASE_PATH }}" ]; then
            echo "BASE_PATH=${{ vars.PAGES_BASE_PATH }}" >> "$GITHUB_ENV"
          elif [ -n "${{ vars.PAGES_CNAME }}" ]; then
            echo "BASE_PATH=" >> "$GITHUB_ENV"
          else
            echo "BASE_PATH=/${{ github.event.repository.name }}" >> "$GITHUB_ENV"
          fi

          if [ -n "${{ vars.PAGES_CNAME }}" ]; then
            echo "CNAME=${{ vars.PAGES_CNAME }}" >> "$GITHUB_ENV"
          fi

      - name: Build site
        run: npm run build:pages

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
